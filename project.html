<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="./CSS/style.css" rel="stylesheet">
    <script src="./JS/main.js"></script>
    <title>Portfolio</title></head>
<body>
<header>
    <nav>
        <a href="index.html">HOME</a>
        <a href="projects.html" class="currentPage">PROJECTS</a>
        <a href="about.html">ABOUT</a>
        <a href="contact.html">CONTACT</a>
    </nav>
</header>

<main>
    <h1></h1>
    <img src="" alt="">
    <p></p>
</main>

<footer>
    <img src="./IMG/GITHUB.webp" alt="GitHub Logo" class="gLogo">
    <a href="https://github.com/Mathijs-04" target="_blank" class="footerLink">GitHub</a>
</footer>
<script>
    window.onload = function() {
        // Get the URL parameters
        let params = new URLSearchParams(window.location.search);

        // Get the project index from the URL parameters
        let projectIndex = params.get('project');

        // Get the project information
        let project = projects[projectIndex];

        // Display the project information
        document.querySelector('main h1').textContent = project.projectTitle;
        document.querySelector('main img').src = project.projectImage;
        document.querySelector('main p').textContent = project.projectDescription;
    }
</script>
</body>
</html>
